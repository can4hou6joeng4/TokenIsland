name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build TokenIslandCore
        run: swift build --target TokenIslandCore

      - name: Build all targets
        run: swift build

      - name: Run tests
        run: swift test --parallel

      - name: Verify CLI (smoke)
        run: |
          .build/debug/TokenIsland help
          .build/debug/TokenIsland doctor
